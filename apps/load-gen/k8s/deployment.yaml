apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-load-gen
  labels:
    app: app-load-gen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-gen
  template:
    metadata:
      labels:
        app: load-gen
    spec:
      serviceAccountName: app-load-gen
      containers:
      - name: app-load-gen
        image: arnausenserrich/load-gen:v1
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "850m"
            memory: "750Mi"
          limits:
            cpu: "1500m"
            memory: "1024Mi"
        env:
        - name: REQUESTS_CA_BUNDLE
          value: /etc/secrets/ca/ca.crt
        - name: URLS_LIST
          value: /config/urls
        volumeMounts:
        - name: external-ca
          mountPath: /etc/secrets/ca/
        - name: config
          mountPath: "/config"
          readOnly: true
      volumes:
      - name: external-ca
        secret:
          secretName: load-gen-ca
      - name: config
        configMap:
          name: urls-list
          items:
          - key: "urls"
            path: "urls"
